name: Node.js CI
on: [push]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm
            - name: Clean install dependencies
              run: npm ci
            - name: Check format
              run: npm run format:check
